<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — CampusNest</title>
 <link rel="icon" type="image/x-icon" href="icon/favicon-16x16.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  .auth-wrap {
    min-height: calc(100vh - 72px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .auth-card {
    background: var(--white);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    width: 100%;
    max-width: 400px;
    padding: 36px;
  }
  .auth-card h1 { font-size: 22px; margin-bottom: 6px; }
  .auth-card p.sub { color: var(--ink-soft); font-size: 13.5px; margin: 0 0 26px; }
  .form-field { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
  .form-field label { font-size: 12.5px; font-weight: 600; color: var(--ink-soft); }
  .form-field input {
    padding: 11px 13px;
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
  }
  .form-field input:focus { border-color: var(--emerald); }
  .auth-switch { text-align: center; font-size: 13px; color: var(--ink-soft); margin-top: 18px; }
  .auth-switch a { color: var(--emerald); font-weight: 600; }
  .success-banner {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--emerald-pale);
    color: var(--emerald);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 13.5px;
    font-weight: 600;
    margin-bottom: 18px;
  }
  .success-banner.show { display: flex; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="logo">
      <svg class="logo-mark" viewBox="0 0 32 32" fill="none">
        <path d="M4 16L16 6L28 16" stroke="#0B5D3B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M8 14V26H24V14" stroke="#0B5D3B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M13 26V19H19V26" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      CampusNest
    </a>

    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-collapse" id="navCollapse">
      <ul class="nav-links">
        <li><a href="results.html">Browse</a></li>
        <li><a href="index.html#how-it-works">How It Works</a></li>
        <li><a href="list-property.html">For Landlords</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost">Log In</a>
        <a href="list-property.html" class="btn btn-amber">List Your Property</a>
      </div>
    </div>
  </div>
</nav>
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="sub">Log in to message landlords and save rooms you like.</p>

    <div class="success-banner" id="successBanner">✓ Logged in — redirecting you home…</div>

    <form id="loginForm">
      <div class="form-field">
        <label for="email">Email or phone number</label>
        <input type="text" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-amber btn-block btn-lg" id="loginBtn">Log In</button>
    </form>

    <div class="auth-switch">
      New to CampusNest? <a href="results.html">Browse rooms without an account →</a>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById("loginForm");
  const banner = document.getElementById("successBanner");
  const btn = document.getElementById("loginBtn");

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    btn.textContent = "Logging in…";
    btn.disabled = true;

    // Mock auth — no real backend. Simulates a short delay then "success".
    setTimeout(() => {
      banner.classList.add("show");
      btn.textContent = "Logged in ✓";
      setTimeout(() => {
        window.location.href = "index.html";
      }, 900);
    }, 700);
  });
</script>

</body>
</html>
